# render.yaml — Render.com deployment config
# ye file Render ko batata hai ki backend kaise build aur run karna hai

services:
  - type: web
    name: scae-backend
    env: java
    plan: free

    # build command — gcc install karo, C files compile karo, Java compile karo
    buildCommand: |
      apt-get install -y gcc make
      make linux
      javac -cp . ScaeServer.java handlers/*.java utils/*.java middleware/*.java

    # server start karo — library path current dir se load hogi
    startCommand: java -Djava.library.path=. ScaeServer

    # environment variables — Render dashboard mein set karo
    envVars:
      - key: PORT
        value: "8000"
      - key: FRONTEND_URL
        value: https://bucolic-biscotti-dfb4d5.netlify.app
      - key: JWT_SECRET
        generateValue: true
